# This workflow builds and tests the GoRelay project.
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Test against both recent Go versions for compatibility
        go-version: ['1.22', '1.23']
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go ${{ matrix.go-version }}
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
        # The action automatically caches dependencies based on go.sum

    - name: Install dependencies
      run: go get .

    - name: Build
      run: go build -v ./...

    - name: Test with race detector
      # The -race flag helps find data races; -v shows verbose output
      run: go test -race -v ./...
